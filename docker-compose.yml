version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: skyvision-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skyvision
    networks:
      - skyvision-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skyvision-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=skyvision
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - skyvision-network
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skyvision-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - skyvision-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

networks:
  skyvision-network:
    driver: bridge

volumes:
  mongodb_data:
